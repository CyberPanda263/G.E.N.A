apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: ${LE_ISSUER_NAME}
spec:
  acme:
    server: ${LE_SERVER_URL}
    email: ${USER_EMAIL}
    privateKeySecretRef:
      name: ${LE_ISSUER_NAME}-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token-secret
              key: api-token
