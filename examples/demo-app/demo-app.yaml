---
# 1. Створення Deployment (Запуск контейнерів)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-web-server
  labels:
    app: demo-web
spec:
  replicas: 2 # Запустити 2 екземпляри додатку для відмовостійкості
  selector:
    matchLabels:
      app: demo-web
  template:
    metadata:
      labels:
        app: demo-web
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

---
# 2. Створення Service (Внутрішній балансувальник)
apiVersion: v1
kind: Service
metadata:
  name: demo-web-svc
spec:
  selector:
    app: demo-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

---
# 3. Створення Ingress (Доступ з інтернету + SSL)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-web-ingress
  annotations:
    # Вказуємо Ingress Controller
    kubernetes.io/ingress.class: "nginx"
    # Автоматичний випуск сертифіката через Let's Encrypt (Cert-Manager)
    cert-manager.io/cluster-issuer: "letsencrypt-production" 
spec:
  rules:
    # ⚠️ ВАЖЛИВО: Замініть на ваш реальний домен (має бути налаштований в Cloudflare)
    - host: demo.yourdomain.com 
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-web-svc
                port:
                  number: 80
  tls:
    - hosts:
        - demo.yourdomain.com
      # Назва секрету, куди Cert-Manager збереже випущений SSL-сертифікат
      secretName: demo-web-tls